upstream populous_backend {
    server 127.0.0.1:4321;
}

server {
    listen 80;
    server_name populousreborn.com www.populousreborn.com;
    return 301 https://populousreborn.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.populousreborn.com;

    ssl_certificate     /etc/letsencrypt/live/populousreborn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/populousreborn.com/privkey.pem;

    return 301 https://populousreborn.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name populousreborn.com;

    ssl_certificate     /etc/letsencrypt/live/populousreborn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/populousreborn.com/privkey.pem;

    # WebSocket support
    location / {
        proxy_pass http://populous_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts — keep connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
