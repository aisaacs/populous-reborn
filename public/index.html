<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Populous</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; font-family: monospace; color: #ccc; }
    canvas { display: block; cursor: crosshair; }
    #game, #ui { display: none; }
    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #ccc;
      font: 14px monospace;
      pointer-events: none;
      user-select: none;
    }

    /* Lobby */
    #lobby {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lobby-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      min-width: 320px;
    }
    .lobby-box h1 {
      color: #66bb33;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .lobby-box .subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 30px;
    }
    .lobby-box button {
      background: #2a7a2a;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font: bold 14px monospace;
      border-radius: 4px;
      cursor: pointer;
      margin: 4px;
    }
    .lobby-box button:hover {
      background: #44aa44;
    }
    .lobby-box input {
      background: #0a0a1a;
      color: #ccc;
      border: 1px solid #444;
      padding: 8px 12px;
      font: 16px monospace;
      border-radius: 4px;
      width: 100px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .lobby-box input::placeholder {
      color: #444;
      letter-spacing: 2px;
    }
    .divider {
      color: #444;
      margin: 20px 0;
      font-size: 12px;
    }
    #waiting-section {
      display: none;
    }
    .room-code-display {
      font-size: 32px;
      color: #4488ff;
      letter-spacing: 6px;
      margin: 12px 0;
    }
    #waiting-text {
      color: #888;
      font-size: 14px;
    }
    #error-text {
      color: #ff4444;
      font-size: 12px;
      margin-top: 12px;
      min-height: 16px;
    }

    /* Power Bar */
    #power-bar {
      display: none;
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px 8px;
      gap: 6px;
      z-index: 10;
      user-select: none;
    }
    .power-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(40, 40, 60, 0.9);
      border: 2px solid #555;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      min-width: 64px;
      transition: border-color 0.15s, opacity 0.15s;
    }
    .power-btn:hover { border-color: #888; }
    .power-btn.disabled { opacity: 0.35; cursor: default; }
    .power-btn.active { border-color: #ff8c00; box-shadow: 0 0 6px rgba(255,140,0,0.5); }
    .power-hotkey {
      font: bold 11px monospace;
      color: #ff8c00;
      margin-bottom: 1px;
    }
    .power-name {
      font: bold 10px monospace;
      color: #ddd;
      margin-bottom: 1px;
    }
    .power-cost {
      font: 9px monospace;
      color: #8af;
    }

    /* Top-right controls */
    .top-ctrl {
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 20;
      user-select: none;
    }
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
    }
    .ctrl-label {
      font: 11px monospace;
      color: #888;
      min-width: 28px;
    }
    .ctrl-row button {
      background: none;
      border: none;
      color: #ccc;
      font: 16px monospace;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .ctrl-row button:hover { color: #fff; }
    .ctrl-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 60px;
      height: 4px;
      background: #444;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .ctrl-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      cursor: pointer;
    }
    .ctrl-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="lobby">
    <div class="lobby-box">
      <h1>POPULOUS</h1>
      <div class="subtitle">1v1 Multiplayer</div>

      <div id="create-section">
        <button id="btn-create">Create Game</button>
        <button id="btn-ai">Play vs AI</button>
      </div>

      <div class="divider">- or -</div>

      <div id="join-section">
        <input id="join-code" type="text" maxlength="4" placeholder="CODE">
        <button id="btn-join">Join</button>
      </div>

      <div id="waiting-section">
        <div class="room-code-display" id="room-code"></div>
        <div id="waiting-text">Waiting for opponent...</div>
      </div>

      <div id="error-text"></div>
    </div>
  </div>

  <canvas id="game"></canvas>
  <div id="power-bar">
    <div class="power-btn" data-power="earthquake"><span class="power-hotkey">Q</span><span class="power-name">Quake</span><span class="power-cost">200</span></div>
    <div class="power-btn" data-power="swamp"><span class="power-hotkey">W</span><span class="power-name">Swamp</span><span class="power-cost">350</span></div>
    <div class="power-btn" data-power="knight"><span class="power-hotkey">E</span><span class="power-name">Knight</span><span class="power-cost">600</span></div>
    <div class="power-btn" data-power="volcano"><span class="power-hotkey">R</span><span class="power-name">Volcano</span><span class="power-cost">1500</span></div>
    <div class="power-btn" data-power="flood"><span class="power-hotkey">T</span><span class="power-name">Flood</span><span class="power-cost">4000</span></div>
    <div class="power-btn" data-power="armageddon"><span class="power-hotkey">Y</span><span class="power-name">Armgddn</span><span class="power-cost">10000</span></div>
  </div>
  <div class="top-ctrl">
    <div class="ctrl-row">
      <button id="btn-mute" title="Mute (M)">&#9835;</button>
      <input id="music-vol" class="ctrl-slider" type="range" min="0" max="100" value="30">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Tex</span>
      <input id="tex-opacity" class="ctrl-slider" type="range" min="0" max="100" value="40">
    </div>
  </div>
  <div id="ui">LMB: Raise &nbsp; RMB: Lower &nbsp; MMB: Pan &nbsp; G: Grid &nbsp; 1-4: Mode &nbsp; Shift+LMB: Magnet &nbsp; Q/W/E/R/T/Y: Powers &nbsp; Esc: Cancel &nbsp; M: Mute</div>

  <script src="/shared/constants.js"></script>
  <script src="game.js"></script>
</body>
</html>
