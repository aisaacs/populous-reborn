<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Populous</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; font-family: monospace; color: #ccc; }
    canvas { display: block; cursor: crosshair; }
    #game, #ui { display: none; }
    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #ccc;
      font: 14px monospace;
      pointer-events: none;
      user-select: none;
    }

    /* Lobby */
    #lobby {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lobby-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      min-width: 320px;
    }
    .lobby-box h1 {
      color: #66bb33;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .lobby-box .subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 30px;
    }
    .lobby-box button {
      background: #2a7a2a;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font: bold 14px monospace;
      border-radius: 4px;
      cursor: pointer;
      margin: 4px;
    }
    .lobby-box button:hover {
      background: #44aa44;
    }
    .lobby-box input {
      background: #0a0a1a;
      color: #ccc;
      border: 1px solid #444;
      padding: 8px 12px;
      font: 16px monospace;
      border-radius: 4px;
      width: 100px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .lobby-box input::placeholder {
      color: #444;
      letter-spacing: 2px;
    }
    .divider {
      color: #444;
      margin: 20px 0;
      font-size: 12px;
    }
    #waiting-section {
      display: none;
    }
    .room-code-display {
      font-size: 32px;
      color: #4488ff;
      letter-spacing: 6px;
      margin: 12px 0;
    }
    #waiting-text {
      color: #888;
      font-size: 14px;
    }
    #error-text {
      color: #ff4444;
      font-size: 12px;
      margin-top: 12px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div id="lobby">
    <div class="lobby-box">
      <h1>POPULOUS</h1>
      <div class="subtitle">1v1 Multiplayer</div>

      <div id="create-section">
        <button id="btn-create">Create Game</button>
        <button id="btn-ai">Play vs AI</button>
      </div>

      <div class="divider">- or -</div>

      <div id="join-section">
        <input id="join-code" type="text" maxlength="4" placeholder="CODE">
        <button id="btn-join">Join</button>
      </div>

      <div id="waiting-section">
        <div class="room-code-display" id="room-code"></div>
        <div id="waiting-text">Waiting for opponent...</div>
      </div>

      <div id="error-text"></div>
    </div>
  </div>

  <canvas id="game"></canvas>
  <div id="ui">LMB: Raise &nbsp; RMB: Lower &nbsp; MMB: Pan &nbsp; G: Grid &nbsp; 1-4: Mode (Settle/Magnet/Fight/Gather) &nbsp; Shift+LMB: Magnet</div>

  <script src="/shared/constants.js"></script>
  <script src="game.js"></script>
</body>
</html>
