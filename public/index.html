<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Populous Reborn</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060611; overflow: hidden; font-family: 'Raleway', sans-serif; color: #ccc; }
    canvas { display: block; cursor: crosshair; }
    #game { display: none; }

    /* ── Lobby background canvas ─────────────────────────────── */
    #lobby-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
    }

    /* ── Lobby ────────────────────────────────────────────────── */
    #lobby {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .lobby-box {
      background: radial-gradient(ellipse at center, rgba(15, 15, 40, 0.92) 0%, rgba(8, 8, 22, 0.96) 100%);
      border: 1px solid rgba(100, 140, 255, 0.15);
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      min-width: 380px;
      box-shadow: 0 0 60px rgba(40, 60, 120, 0.15), 0 0 120px rgba(30, 50, 100, 0.08), inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
    }
    .lobby-box h1 {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-weight: 900;
      font-size: 48px;
      letter-spacing: 8px;
      margin-bottom: 0;
      line-height: 1.1;
      background: linear-gradient(180deg, #b8d8ff 0%, #4488ff 40%, #2266cc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(68, 136, 255, 0.4));
      animation: titlePulse 4s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(68, 136, 255, 0.3)); }
      50% { filter: drop-shadow(0 0 35px rgba(68, 136, 255, 0.6)); }
    }
    .lobby-box .title-sub {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 18px;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: rgba(130, 170, 255, 0.45);
      margin-bottom: 6px;
      margin-left: 14px;
    }
    .lobby-box .subtitle {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      color: rgba(160, 180, 220, 0.45);
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .lobby-box button {
      background: linear-gradient(180deg, rgba(30, 50, 100, 0.9) 0%, rgba(18, 32, 70, 0.95) 100%);
      color: rgba(180, 210, 255, 0.9);
      border: 1px solid rgba(80, 130, 255, 0.25);
      padding: 12px 28px;
      font: 600 13px 'Raleway', sans-serif;
      letter-spacing: 2px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
      transition: all 0.25s;
      text-transform: uppercase;
    }
    .lobby-box button:hover {
      background: linear-gradient(180deg, rgba(40, 65, 130, 0.95) 0%, rgba(25, 45, 95, 0.95) 100%);
      border-color: rgba(100, 160, 255, 0.5);
      box-shadow: 0 0 25px rgba(68, 136, 255, 0.2);
      color: #fff;
    }
    .lobby-box button:active {
      transform: scale(0.97);
    }
    .lobby-box input[type="text"] {
      background: rgba(5, 5, 20, 0.8);
      color: #b8d8ff;
      border: 1px solid rgba(100, 140, 255, 0.25);
      padding: 10px 14px;
      font: 600 18px 'Raleway', sans-serif;
      border-radius: 6px;
      width: 110px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 6px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .lobby-box input[type="text"]:focus {
      outline: none;
      border-color: rgba(100, 140, 255, 0.5);
      box-shadow: 0 0 15px rgba(68, 136, 255, 0.15);
    }
    .lobby-box input[type="text"]::placeholder {
      color: rgba(100, 130, 180, 0.35);
      letter-spacing: 3px;
    }
    .lobby-box select {
      background: rgba(5, 5, 20, 0.8);
      color: #b8d8ff;
      border: 1px solid rgba(100, 140, 255, 0.25);
      padding: 8px 12px;
      font: 600 13px 'Raleway', sans-serif;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s;
      margin: 4px;
    }
    .lobby-box select:focus {
      outline: none;
      border-color: rgba(100, 140, 255, 0.5);
    }
    .lobby-box select option {
      background: #0a0a1a;
      color: #b8d8ff;
    }
    .lobby-settings {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .lobby-setting-label {
      font: 300 11px 'Raleway', sans-serif;
      color: rgba(160, 180, 220, 0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .divider {
      color: rgba(100, 140, 200, 0.3);
      margin: 24px 0;
      font-size: 11px;
      letter-spacing: 4px;
      font-weight: 300;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 60px;
      height: 1px;
    }
    .divider::before { right: calc(50% + 36px); background: linear-gradient(90deg, transparent, rgba(100, 140, 255, 0.15)); }
    .divider::after { left: calc(50% + 36px); background: linear-gradient(-90deg, transparent, rgba(100, 140, 255, 0.15)); }
    #waiting-section {
      display: none;
    }
    .room-code-display {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-weight: 700;
      font-size: 36px;
      color: #6aa8ff;
      letter-spacing: 10px;
      margin: 16px 0;
      text-shadow: 0 0 20px rgba(68, 136, 255, 0.4);
    }
    #waiting-text {
      color: rgba(160, 180, 220, 0.6);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 1px;
      animation: waitPulse 2s ease-in-out infinite;
    }
    @keyframes waitPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    #error-text {
      color: #ff6666;
      font-size: 12px;
      font-weight: 400;
      margin-top: 16px;
      min-height: 18px;
    }
    /* Lobby volume control */
    .lobby-vol {
      position: fixed;
      bottom: 20px;
      right: 24px;
      z-index: 15;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    .lobby-vol:hover { opacity: 1; }
    .lobby-vol button {
      background: none;
      border: none;
      color: #8ab;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
    }
    .lobby-vol input {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 3px;
      background: #334;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .lobby-vol input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #8ab;
      cursor: pointer;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 160px;
      height: 100vh;
      background: rgba(10, 10, 20, 0.85);
      border-right: 1px solid #333;
      z-index: 20;
      user-select: none;
      overflow-y: auto;
      padding: 8px;
      flex-direction: column;
      gap: 6px;
    }
    #sidebar.visible { display: flex; }

    .sb-section {
      border-bottom: 1px solid #282828;
      padding-bottom: 6px;
      margin-bottom: 2px;
    }
    .sb-section:last-child { border-bottom: none; }

    .sb-label {
      font: bold 9px monospace;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }

    /* Population bars */
    .pop-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 3px;
    }
    .pop-label {
      font: bold 10px monospace;
      width: 14px;
      text-align: center;
    }
    .pop-bar-bg {
      flex: 1;
      height: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 2px;
      overflow: hidden;
    }
    .pop-bar-fill {
      height: 100%;
      transition: width 0.15s;
    }
    .pop-val {
      font: 9px monospace;
      color: #888;
      width: 30px;
      text-align: right;
    }

    /* Mana */
    .mana-bar-bg {
      width: 100%;
      height: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 2px;
    }
    .mana-bar-fill {
      height: 100%;
      background: #66aaff;
      transition: width 0.15s;
    }
    .mana-text {
      font: 10px monospace;
      color: #8af;
      text-align: center;
    }

    /* Mode buttons — 2x2 grid */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }
    .mode-btn {
      background: rgba(40, 40, 60, 0.9);
      border: 1px solid #444;
      border-radius: 3px;
      color: #aaa;
      font: bold 10px monospace;
      padding: 6px 0;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.1s, color 0.1s;
    }
    .mode-btn:hover { border-color: #888; color: #ddd; }
    .mode-btn.active { border-color: #4a4; color: #6d6; background: rgba(40, 80, 40, 0.6); }

    /* Tool buttons */
    .tool-btn {
      width: 100%;
      background: rgba(40, 40, 60, 0.9);
      border: 1px solid #444;
      border-radius: 3px;
      color: #aaa;
      font: bold 10px monospace;
      padding: 5px 0;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.1s, color 0.1s;
      margin-bottom: 2px;
    }
    .tool-btn:hover { border-color: #888; color: #ddd; }
    .tool-btn.active { border-color: #ff8c00; color: #ffaa33; background: rgba(80, 60, 20, 0.6); }

    /* Power buttons in sidebar */
    .power-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .power-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(40, 40, 60, 0.9);
      border: 1px solid #444;
      border-radius: 3px;
      padding: 4px 6px;
      cursor: pointer;
      transition: border-color 0.15s, opacity 0.15s;
    }
    .power-btn:hover { border-color: #888; }
    .power-btn.disabled { opacity: 0.35; cursor: default; }
    .power-btn.active { border-color: #ff8c00; box-shadow: 0 0 4px rgba(255,140,0,0.4); }
    .power-hotkey {
      font: bold 10px monospace;
      color: #ff8c00;
      width: 12px;
      text-align: center;
    }
    .power-name {
      font: bold 9px monospace;
      color: #ddd;
      flex: 1;
    }
    .power-cost {
      font: 9px monospace;
      color: #8af;
    }

    /* Stats */
    .stat-line {
      font: 10px monospace;
      color: #888;
      line-height: 1.4;
    }
    .stat-val { color: #ccc; }

    /* Slider rows */
    .sb-slider-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 2px;
    }
    .sb-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      background: #333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .sb-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #aaa;
      cursor: pointer;
    }
    .sb-slider::-moz-range-thumb {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #aaa;
      border: none;
      cursor: pointer;
    }
    .sb-icon-btn {
      background: none;
      border: none;
      color: #888;
      font: 12px monospace;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .sb-icon-btn:hover { color: #ccc; }

    /* Settings toggle buttons */
    .setting-btn {
      width: 100%;
      background: rgba(40, 40, 60, 0.9);
      border: 1px solid #444;
      border-radius: 3px;
      color: #888;
      font: bold 9px monospace;
      padding: 4px 6px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.1s, color 0.1s;
      margin-bottom: 2px;
    }
    .setting-btn:hover { border-color: #888; color: #ddd; }
    .setting-btn.on { border-color: #4a4; color: #6d6; background: rgba(40, 80, 40, 0.5); }

    .sb-music-vol { padding: 4px 0 2px 0; }

    /* Gear button */
    .gear-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 3px;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      padding: 3px 12px;
      transition: color 0.15s, border-color 0.15s;
    }
    .gear-btn:hover { color: #ddd; border-color: #888; }

    /* Settings popup */
    .settings-popup {
      display: none;
      position: fixed;
      left: 170px;
      bottom: 60px;
      width: 180px;
      background: rgba(15, 15, 30, 0.95);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px;
      z-index: 30;
      flex-direction: column;
      gap: 4px;
    }
    .settings-popup.visible { display: flex; }
    .settings-title {
      font: bold 10px monospace;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <canvas id="lobby-bg"></canvas>
  <div id="lobby">
    <div class="lobby-box">
      <h1>POPULOUS</h1>
      <div class="title-sub">Reborn</div>
      <div class="subtitle">Multiplayer God Game</div>

      <div id="create-section">
        <div class="lobby-settings">
          <div>
            <div class="lobby-setting-label">Players</div>
            <select id="sel-players">
              <option value="2">2 Players</option>
              <option value="3">3 Players</option>
              <option value="4">4 Players</option>
              <option value="5">5 Players</option>
              <option value="6">6 Players</option>
            </select>
          </div>
          <div>
            <div class="lobby-setting-label">Map Size</div>
            <select id="sel-mapsize">
              <option value="small">Small (64x64)</option>
              <option value="medium">Medium (96x96)</option>
              <option value="large">Large (128x128)</option>
            </select>
          </div>
        </div>
        <button id="btn-create">Create Game</button>
        <button id="btn-ai">Play vs AI</button>
      </div>

      <div class="divider">or join</div>

      <div id="join-section">
        <input id="join-code" type="text" maxlength="4" placeholder="CODE">
        <button id="btn-join">Join</button>
      </div>

      <div id="waiting-section">
        <div class="room-code-display" id="room-code"></div>
        <div id="waiting-text">Waiting for players...</div>
      </div>

      <div id="error-text"></div>
    </div>
  </div>

  <!-- Lobby volume control (visible on title screen) -->
  <div class="lobby-vol" id="lobby-vol">
    <button id="lobby-mute-btn">&#9835;</button>
    <input id="lobby-vol-slider" type="range" min="0" max="100" value="30">
  </div>

  <canvas id="game"></canvas>

  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Population (dynamically built) -->
    <div class="sb-section" id="pop-section">
      <div class="sb-label">Population</div>
      <div id="pop-bars"></div>
    </div>

    <!-- Mana -->
    <div class="sb-section">
      <div class="sb-label">Mana</div>
      <div class="mana-bar-bg"><div id="mana-bar-fill" class="mana-bar-fill" style="width:0"></div></div>
      <div id="mana-text" class="mana-text">0</div>
    </div>

    <!-- Mode — 2x2 grid -->
    <div class="sb-section">
      <div class="sb-label">Mode</div>
      <div class="mode-grid">
        <button class="mode-btn" data-mode="0">Settle</button>
        <button class="mode-btn" data-mode="1">Magnet</button>
        <button class="mode-btn" data-mode="2">Fight</button>
        <button class="mode-btn" data-mode="3">Gather</button>
      </div>
    </div>

    <!-- Divine Powers — ordered least to most powerful -->
    <div class="sb-section">
      <div class="sb-label">Powers</div>
      <div class="power-list">
        <div class="power-btn" data-power="swamp"><span class="power-hotkey">W</span><span class="power-name">Swamp</span><span class="power-cost">60</span></div>
        <div class="power-btn" data-power="knight"><span class="power-hotkey">E</span><span class="power-name">Knight</span><span class="power-cost">200</span></div>
        <div class="power-btn" data-power="flood"><span class="power-hotkey">T</span><span class="power-name">Flood</span><span class="power-cost">500</span></div>
        <div class="power-btn" data-power="earthquake"><span class="power-hotkey">Q</span><span class="power-name">Earthquake</span><span class="power-cost">1500</span></div>
        <div class="power-btn" data-power="volcano"><span class="power-hotkey">R</span><span class="power-name">Volcano</span><span class="power-cost">5000</span></div>
        <div class="power-btn" data-power="armageddon"><span class="power-hotkey">Y</span><span class="power-name">Armageddon</span><span class="power-cost">ALL</span></div>
      </div>
    </div>

    <!-- Tools -->
    <div class="sb-section">
      <div class="sb-label">Tools</div>
      <button id="btn-magnet" class="tool-btn">Magnet (F)</button>
      <button id="btn-inspect" class="tool-btn">Inspect (I)</button>
    </div>

    <!-- Stats -->
    <div class="sb-section">
      <div class="sb-label">Your Team</div>
      <div class="stat-line">Settlements: <span id="stat-my-set" class="stat-val">0</span></div>
      <div class="stat-line">Walkers: <span id="stat-my-walk" class="stat-val">0</span></div>
    </div>
    <div class="sb-section" id="opp-stats-section">
      <div class="sb-label">Opponents</div>
      <div id="opp-stats"></div>
    </div>

    <!-- Settings gear -->
    <div class="sb-section" style="text-align:center">
      <button id="btn-settings-gear" class="gear-btn" title="Settings">&#9881;</button>
    </div>

    <!-- Performance -->
    <div class="sb-section">
      <div class="sb-label">Perf</div>
      <div class="stat-line">FPS: <span id="perf-fps" class="stat-val">--</span></div>
      <div class="stat-line">Frame: <span id="perf-frame" class="stat-val">--</span> ms</div>
    </div>
  </div>

  <!-- Settings popup -->
  <div id="settings-popup" class="settings-popup">
    <div class="settings-title">Settings</div>
    <button class="setting-btn" data-setting="hiRes">Hi-Res Textures</button>
    <button class="setting-btn" data-setting="effects">Effects</button>
    <button class="setting-btn" data-setting="music">Music</button>
    <div class="sb-slider-row sb-music-vol" id="music-vol-row">
      <button id="btn-mute" class="sb-icon-btn" title="Mute (M)">&#9835;</button>
      <input id="music-vol" class="sb-slider" type="range" min="0" max="100" value="30">
    </div>
    <button class="setting-btn" data-setting="lowZoomSimplify">Simplify at Low Zoom</button>
  </div>

  <script src="/shared/constants.js"></script>
  <script src="game.js"></script>
</body>
</html>
