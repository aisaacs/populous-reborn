<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Populous</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; font-family: monospace; color: #ccc; }
    canvas { display: block; cursor: crosshair; }
    #game { display: none; }

    /* Lobby */
    #lobby {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lobby-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      min-width: 320px;
    }
    .lobby-box h1 {
      color: #66bb33;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .lobby-box .subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 30px;
    }
    .lobby-box button {
      background: #2a7a2a;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font: bold 14px monospace;
      border-radius: 4px;
      cursor: pointer;
      margin: 4px;
    }
    .lobby-box button:hover {
      background: #44aa44;
    }
    .lobby-box input {
      background: #0a0a1a;
      color: #ccc;
      border: 1px solid #444;
      padding: 8px 12px;
      font: 16px monospace;
      border-radius: 4px;
      width: 100px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .lobby-box input::placeholder {
      color: #444;
      letter-spacing: 2px;
    }
    .divider {
      color: #444;
      margin: 20px 0;
      font-size: 12px;
    }
    #waiting-section {
      display: none;
    }
    .room-code-display {
      font-size: 32px;
      color: #4488ff;
      letter-spacing: 6px;
      margin: 12px 0;
    }
    #waiting-text {
      color: #888;
      font-size: 14px;
    }
    #error-text {
      color: #ff4444;
      font-size: 12px;
      margin-top: 12px;
      min-height: 16px;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 160px;
      height: 100vh;
      background: rgba(10, 10, 20, 0.85);
      border-right: 1px solid #333;
      z-index: 20;
      user-select: none;
      overflow-y: auto;
      padding: 8px;
      flex-direction: column;
      gap: 6px;
    }
    #sidebar.visible { display: flex; }

    .sb-section {
      border-bottom: 1px solid #282828;
      padding-bottom: 6px;
      margin-bottom: 2px;
    }
    .sb-section:last-child { border-bottom: none; }

    .sb-label {
      font: bold 9px monospace;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }

    /* Population bars */
    .pop-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 5px;
    }
    .pop-label {
      font: bold 10px monospace;
      width: 14px;
      text-align: center;
    }
    .pop-bar-bg {
      flex: 1;
      height: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 2px;
      overflow: hidden;
    }
    .pop-bar-fill {
      height: 100%;
      transition: width 0.15s;
    }
    .pop-val {
      font: 9px monospace;
      color: #888;
      width: 30px;
      text-align: right;
    }

    /* Mana */
    .mana-bar-bg {
      width: 100%;
      height: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 2px;
    }
    .mana-bar-fill {
      height: 100%;
      background: #66aaff;
      transition: width 0.15s;
    }
    .mana-text {
      font: 10px monospace;
      color: #8af;
      text-align: center;
    }

    /* Mode buttons */
    .mode-row {
      display: flex;
      gap: 2px;
    }
    .mode-btn {
      flex: 1;
      background: rgba(40, 40, 60, 0.9);
      border: 1px solid #444;
      border-radius: 3px;
      color: #aaa;
      font: bold 9px monospace;
      padding: 4px 0;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.1s, color 0.1s;
    }
    .mode-btn:hover { border-color: #888; color: #ddd; }
    .mode-btn.active { border-color: #4a4; color: #6d6; background: rgba(40, 80, 40, 0.6); }

    /* Tool buttons */
    .tool-btn {
      width: 100%;
      background: rgba(40, 40, 60, 0.9);
      border: 1px solid #444;
      border-radius: 3px;
      color: #aaa;
      font: bold 10px monospace;
      padding: 5px 0;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.1s, color 0.1s;
      margin-bottom: 2px;
    }
    .tool-btn:hover { border-color: #888; color: #ddd; }
    .tool-btn.active { border-color: #ff8c00; color: #ffaa33; background: rgba(80, 60, 20, 0.6); }

    /* Stats */
    .stat-line {
      font: 10px monospace;
      color: #888;
      line-height: 1.4;
    }
    .stat-val { color: #ccc; }

    /* Slider rows */
    .sb-slider-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 2px;
    }
    .sb-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      background: #333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .sb-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #aaa;
      cursor: pointer;
    }
    .sb-slider::-moz-range-thumb {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #aaa;
      border: none;
      cursor: pointer;
    }
    .sb-icon-btn {
      background: none;
      border: none;
      color: #888;
      font: 12px monospace;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .sb-icon-btn:hover { color: #ccc; }

    /* Power Bar */
    #power-bar {
      display: none;
      position: fixed;
      bottom: 12px;
      left: calc(160px + (100% - 160px) / 2);
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px 8px;
      gap: 6px;
      z-index: 10;
      user-select: none;
    }
    .power-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(40, 40, 60, 0.9);
      border: 2px solid #555;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      min-width: 64px;
      transition: border-color 0.15s, opacity 0.15s;
    }
    .power-btn:hover { border-color: #888; }
    .power-btn.disabled { opacity: 0.35; cursor: default; }
    .power-btn.active { border-color: #ff8c00; box-shadow: 0 0 6px rgba(255,140,0,0.5); }
    .power-hotkey {
      font: bold 11px monospace;
      color: #ff8c00;
      margin-bottom: 1px;
    }
    .power-name {
      font: bold 10px monospace;
      color: #ddd;
      margin-bottom: 1px;
    }
    .power-cost {
      font: 9px monospace;
      color: #8af;
    }
  </style>
</head>
<body>
  <div id="lobby">
    <div class="lobby-box">
      <h1>POPULOUS</h1>
      <div class="subtitle">1v1 Multiplayer</div>

      <div id="create-section">
        <button id="btn-create">Create Game</button>
        <button id="btn-ai">Play vs AI</button>
      </div>

      <div class="divider">- or -</div>

      <div id="join-section">
        <input id="join-code" type="text" maxlength="4" placeholder="CODE">
        <button id="btn-join">Join</button>
      </div>

      <div id="waiting-section">
        <div class="room-code-display" id="room-code"></div>
        <div id="waiting-text">Waiting for opponent...</div>
      </div>

      <div id="error-text"></div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Population -->
    <div class="sb-section">
      <div class="sb-label">Population</div>
      <div class="pop-row">
        <span class="pop-label" style="color:#4488ff">B</span>
        <div class="pop-bar-bg"><div id="pop-bar-blue" class="pop-bar-fill" style="width:0;background:#4488ff"></div></div>
        <span id="pop-val-blue" class="pop-val">0</span>
      </div>
      <div class="pop-row">
        <span class="pop-label" style="color:#ff4444">R</span>
        <div class="pop-bar-bg"><div id="pop-bar-red" class="pop-bar-fill" style="width:0;background:#ff4444"></div></div>
        <span id="pop-val-red" class="pop-val">0</span>
      </div>
    </div>

    <!-- Mana -->
    <div class="sb-section">
      <div class="sb-label">Mana</div>
      <div class="mana-bar-bg"><div id="mana-bar-fill" class="mana-bar-fill" style="width:0"></div></div>
      <div id="mana-text" class="mana-text">0</div>
    </div>

    <!-- Mode -->
    <div class="sb-section">
      <div class="sb-label">Mode</div>
      <div class="mode-row">
        <button class="mode-btn" data-mode="0">1 Stl</button>
        <button class="mode-btn" data-mode="1">2 Mag</button>
        <button class="mode-btn" data-mode="2">3 Fgt</button>
        <button class="mode-btn" data-mode="3">4 Gth</button>
      </div>
    </div>

    <!-- Tools -->
    <div class="sb-section">
      <div class="sb-label">Tools</div>
      <button id="btn-inspect" class="tool-btn">Inspect (I)</button>
    </div>

    <!-- Stats -->
    <div class="sb-section">
      <div class="sb-label">Your Team</div>
      <div class="stat-line">Settlements: <span id="stat-my-set" class="stat-val">0</span></div>
      <div class="stat-line">Walkers: <span id="stat-my-walk" class="stat-val">0</span></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Opponent</div>
      <div class="stat-line">Settlements: <span id="stat-opp-set" class="stat-val">0</span></div>
      <div class="stat-line">Walkers: <span id="stat-opp-walk" class="stat-val">0</span></div>
    </div>

    <!-- Settings -->
    <div class="sb-section">
      <div class="sb-label">Settings</div>
      <div class="sb-slider-row">
        <button id="btn-mute" class="sb-icon-btn" title="Mute (M)">&#9835;</button>
        <input id="music-vol" class="sb-slider" type="range" min="0" max="100" value="30">
      </div>
    </div>
  </div>

  <div id="power-bar">
    <div class="power-btn" data-power="earthquake"><span class="power-hotkey">Q</span><span class="power-name">Quake</span><span class="power-cost">1500</span></div>
    <div class="power-btn" data-power="swamp"><span class="power-hotkey">W</span><span class="power-name">Swamp</span><span class="power-cost">60</span></div>
    <div class="power-btn" data-power="knight"><span class="power-hotkey">E</span><span class="power-name">Knight</span><span class="power-cost">200</span></div>
    <div class="power-btn" data-power="volcano"><span class="power-hotkey">R</span><span class="power-name">Volcano</span><span class="power-cost">5000</span></div>
    <div class="power-btn" data-power="flood"><span class="power-hotkey">T</span><span class="power-name">Flood</span><span class="power-cost">500</span></div>
    <div class="power-btn" data-power="armageddon"><span class="power-hotkey">Y</span><span class="power-name">Armgddn</span><span class="power-cost">ALL</span></div>
  </div>

  <script src="/shared/constants.js"></script>
  <script src="game.js"></script>
</body>
</html>
